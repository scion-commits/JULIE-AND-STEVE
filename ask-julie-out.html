<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question for Julie</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #1b1830;
    --night-deep: #131024;
    --lavender: #c9bfff;
    --gold: #f2c94c;
    --pink: #ff8fb1;
    --paper: #f5f3ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at 30% 20%, #6a3fb5 0%, #4527a0 30%, #2d1b69 65%, #1a0f3d 100%);
    font-family: 'Poppins', sans-serif;
    color: var(--paper);
    overflow: hidden;
  }

  #sky {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: var(--paper);
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 3s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.9; }
  }

  .container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    padding-bottom: 190px;
  }

  .eyebrow {
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-size: 12px;
    color: var(--lavender);
    margin-bottom: 18px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: clamp(2.4rem, 7vw, 5rem);
    margin: 0 0 8px 0;
    color: var(--paper);
    text-shadow: 0 0 30px rgba(201, 191, 255, 0.35);
  }

  .sub {
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: var(--lavender);
    font-weight: 300;
    margin-bottom: 56px;
    max-width: 460px;
  }

  .buttons {
    position: relative;
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    width: 100%;
  }

  button {
    font-family: 'Poppins', sans-serif;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 500;
    transition: transform 0.15s ease, box-shadow 0.15s ease, font-size 0.2s ease, padding 0.2s ease;
  }

  #yes {
    background: linear-gradient(135deg, var(--gold), #ffe08a);
    color: #3a2b00;
    padding: 16px 38px;
    font-size: 1.05rem;
    box-shadow: 0 8px 30px rgba(242, 201, 76, 0.35);
  }

  #yes:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 10px 36px rgba(242, 201, 76, 0.5);
  }

  #no {
    background: transparent;
    color: var(--paper);
    border: 1.5px solid rgba(245, 243, 255, 0.4);
    padding: 16px 38px;
    font-size: 1.05rem;
    position: absolute;
  }

  .hint {
    margin-top: 30px;
    font-size: 0.8rem;
    color: rgba(201, 191, 255, 0.6);
    min-height: 20px;
    transition: opacity 0.2s ease;
  }

  /* Celebration screen */
  #celebration {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(255, 143, 177, 0.18), transparent 60%);
  }

  #celebration h2 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    color: var(--gold);
    margin: 0 0 12px 0;
  }

  #celebration p {
    color: var(--lavender);
    font-size: 1rem;
    max-width: 400px;
  }

  .heart {
    position: fixed;
    top: -10%;
    font-size: 1.5rem;
    animation: fall linear forwards;
    z-index: 4;
    pointer-events: none;
  }

  @keyframes fall {
    to {
      transform: translateY(115vh) rotate(360deg);
      opacity: 0;
    }
  }

  #celebrationTwo {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    background: radial-gradient(ellipse at 50% 40%, rgba(242, 201, 76, 0.2), transparent 60%);
  }

  #celebrationTwo h2 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    color: var(--gold);
    margin: 0 0 12px 0;
  }

  #celebrationTwo p {
    color: var(--lavender);
    font-size: 1rem;
    max-width: 400px;
  }

  #continueBtn {
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  #continueBtn:hover {
    transform: translateY(-2px);
  }

  @media (prefers-reduced-motion: reduce) {
    .star, .heart { animation: none !important; }
  }

  #musicPlayer {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: min(320px, 90vw);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div id="musicPlayer">
  <iframe
    src="https://open.spotify.com/embed/track/6mORGLOz79w6VsCRLWYYuK?utm_source=generator&theme=0"
    width="100%"
    height="152"
    frameborder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy">
  </iframe>
</div>

<div class="container" id="main">
  <div class="eyebrow">a bigger question</div>
  <h1>Julie&hellip;</h1>
  <p class="sub">Will you be my girl?</p>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Yes, I'm yours</button>
    <button id="no" onclick="dodge()">No</button>
  </div>

  <div class="hint" id="hint"></div>
</div>

<div id="celebration">
  <h2>She's mine. 💛</h2>
  <p>Officially, happily, unmistakably together.</p>
</div>

<script>
  // Starry background
  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const bubbleColors = [
    [255, 143, 177],  // pink
    [242, 201, 76],   // gold
    [130, 220, 220],  // teal
    [201, 191, 255],  // lavender
    [255, 180, 120]   // peach
  ];

  const bubbles = Array.from({ length: 26 }, () => {
    const c = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + Math.random() * canvas.height,
      r: Math.random() * 26 + 10,
      color: c,
      speed: Math.random() * 0.35 + 0.1,
      drift: Math.random() * 0.6 - 0.3,
      phase: Math.random() * Math.PI * 2
    };
  });

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const b of bubbles) {
      b.y -= b.speed;
      b.x += Math.sin(t * 0.001 + b.phase) * b.drift * 0.5;
      if (b.y < -60) {
        b.y = canvas.height + 60;
        b.x = Math.random() * canvas.width;
      }
      const [r, g, bl] = b.color;
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      grad.addColorStop(0, `rgba(${r},${g},${bl},0.55)`);
      grad.addColorStop(0.7, `rgba(${r},${g},${bl},0.18)`);
      grad.addColorStop(1, `rgba(${r},${g},${bl},0)`);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // soft rim highlight
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,0.25)`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  const teases = [
    "hmm, try again",
    "not quite",
    "so close, yet so far",
    "the button doesn't want to be clicked either",
    "it's shy",
    "come on, Julie",
    "the universe says yes",
    "just say yes, Julie"
  ];

  // Reusable dodge-button setup: makes a "no" button evade clicks/hover
  // and grows the paired "yes" button with each miss.
  function setupDodge({ noId, yesId, hintId, boxSelector, teaseList }) {
    const noBtn = document.getElementById(noId);
    const yesBtn = document.getElementById(yesId);
    const hint = document.getElementById(hintId);
    const buttonsBox = document.querySelector(boxSelector);

    let dodgeCount = 0;

    function dodge() {
      const boxRect = buttonsBox.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = boxRect.width - btnRect.width - 10;
      const maxY = 140;

      const newX = Math.random() * maxX - maxX / 2;
      const newY = (Math.random() - 0.5) * maxY;

      noBtn.style.transform = `translate(${newX}px, ${newY}px)`;

      dodgeCount++;
      const scale = Math.min(1 + dodgeCount * 0.12, 2.2);
      yesBtn.style.transform = `scale(${scale})`;
      yesBtn.style.padding = `${16 + dodgeCount}px ${38 + dodgeCount * 2}px`;

      hint.textContent = teaseList[Math.min(dodgeCount - 1, teaseList.length - 1)];
    }

    noBtn.addEventListener('mouseenter', dodge);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      dodge();
    }, { passive: false });
    noBtn.addEventListener('click', dodge);
  }

  setupDodge({ noId: 'no', yesId: 'yes', hintId: 'hint', boxSelector: '#main .buttons', teaseList: teases });

  function sayYes() {
    document.getElementById('main').style.display = 'none';
    document.getElementById('celebration').style.display = 'flex';
    burstHearts(['💛','❤️','✨','💍']);
  }

  function burstHearts(emojis) {
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'heart';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + 'vw';
        h.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
        h.style.fontSize = (Math.random() * 1.2 + 1) + 'rem';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
      }, i * 60);
    }
  }
</script>

</body>
</html>
